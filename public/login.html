<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamCast — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--gradient-hero); padding: 24px;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--glass-bg); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl); padding: 40px;
      box-shadow: var(--shadow-xl);
    }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
    .auth-logo svg { width: 36px; height: 36px; }
    .auth-logo span { font-size: 1.5rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .auth-title { text-align: center; margin-bottom: 8px; }
    .auth-subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 12px; font-size: 0.85rem; color: var(--accent-red); margin-bottom: 16px; display: none; }
    .auth-error.visible { display: block; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-blue); font-weight: 600; }
    .btn-block { width: 100%; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="url(#lg)"/><polygon points="13,10 13,22 23,16" fill="white"/><defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#2D68FF"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs></svg>
        <span>StreamCast</span>
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      <div class="auth-error" id="auth-error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" value="demo@streamcast.io" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" value="demo123" required>
        </div>
        <div class="form-group" style="display:flex;align-items:center;justify-content:space-between;">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" checked style="accent-color:var(--accent-blue);"> Remember me
          </label>
          <a href="#" style="font-size:0.85rem;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up free</a>
      </div>
    </div>
  </div>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('auth-error');
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        localStorage.setItem('streamcast_token', data.token);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
